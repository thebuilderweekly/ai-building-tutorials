    <text x="56" y="106" font-family="Inter, sans-serif" font-size="11" font-weight="700" letter-spacing="0.1em" fill="#1a1a1a">PRODUCTS &amp; APPS</text>
    <text x="56" y="128" font-family="Inter, sans-serif" font-size="12" fill="#3a3a3a">Software products</text>
    <text x="56" y="144" font-family="Inter, sans-serif" font-size="12" fill="#3a3a3a">Consumer apps</text>
    <text x="56" y="160" font-family="Inter, sans-serif" font-size="12" fill="#3a3a3a">Internal tools, APIs</text>
  </g>

  <g>
    <rect x="290" y="80" width="220" height="100" fill="#FFF47F" stroke="#1a1a1a" stroke-width="1.5"/>
    <text x="306" y="106" font-family="Inter, sans-serif" font-size="11" font-weight="700" letter-spacing="0.1em" fill="#1a1a1a">AGENTS &amp; WORKFLOWS</text>
    <text x="306" y="128" font-family="Inter, sans-serif" font-size="12" fill="#3a3a3a">Specialized agents</text>
    <text x="306" y="144" font-family="Inter, sans-serif" font-size="12" fill="#3a3a3a">Multi-step workflows</text>
    <text x="306" y="160" font-family="Inter, sans-serif" font-size="12" fill="#3a3a3a">Personal infrastructure</text>
  </g>

  <g>
    <rect x="540" y="80" width="220" height="100" fill="#FFF47F" stroke="#1a1a1a" stroke-width="1.5"/>
    <text x="556" y="106" font-family="Inter, sans-serif" font-size="11" font-weight="700" letter-spacing="0.1em" fill="#1a1a1a">CONTENT &amp; MEDIA</text>
    <text x="556" y="128" font-family="Inter, sans-serif" font-size="12" fill="#3a3a3a">Newsletters, courses</text>
    <text x="556" y="144" font-family="Inter, sans-serif" font-size="12" fill="#3a3a3a">Video, podcasts, books</text>
    <text x="556" y="160" font-family="Inter, sans-serif" font-size="12" fill="#3a3a3a">Generative design</text>
  </g>

  <g>
    <rect x="40" y="200" width="220" height="100" fill="#FFF47F" stroke="#1a1a1a" stroke-width="1.5"/>
    <text x="56" y="226" font-family="Inter, sans-serif" font-size="11" font-weight="700" letter-spacing="0.1em" fill="#1a1a1a">KNOWLEDGE WORK</text>
    <text x="56" y="248" font-family="Inter, sans-serif" font-size="12" fill="#3a3a3a">Research, journalism</text>
    <text x="56" y="264" font-family="Inter, sans-serif" font-size="12" fill="#3a3a3a">Legal, financial analysis</text>
    <text x="56" y="280" font-family="Inter, sans-serif" font-size="12" fill="#3a3a3a">Translation</text>
  </g>

  <g>
    <rect x="290" y="200" width="220" height="100" fill="#FFF47F" stroke="#1a1a1a" stroke-width="1.5"/>
    <text x="306" y="226" font-family="Inter, sans-serif" font-size="11" font-weight="700" letter-spacing="0.1em" fill="#1a1a1a">OPERATIONS &amp; GROWTH</text>
    <text x="306" y="248" font-family="Inter, sans-serif" font-size="12" fill="#3a3a3a">Marketing operations</text>
    <text x="306" y="264" font-family="Inter, sans-serif" font-size="12" fill="#3a3a3a">Sales, support, success</text>
    <text x="306" y="280" font-family="Inter, sans-serif" font-size="12" fill="#3a3a3a">Recruiting, HR, analytics</text>
  </g>

  <g>
    <rect x="540" y="200" width="220" height="100" fill="#FFF47F" stroke="#1a1a1a" stroke-width="1.5"/>
    <text x="556" y="226" font-family="Inter, sans-serif" font-size="11" font-weight="700" letter-spacing="0.1em" fill="#1a1a1a">INDUSTRIES &amp; TRADES</text>
    <text x="556" y="248" font-family="Inter, sans-serif" font-size="12" fill="#3a3a3a">Real estate, construction</text>
    <text x="556" y="264" font-family="Inter, sans-serif" font-size="12" fill="#3a3a3a">Manufacturing, logistics</text>
    <text x="556" y="280" font-family="Inter, sans-serif" font-size="12" fill="#3a3a3a">Agriculture, hospitality</text>
  </g>

  <g>
    <rect x="160" y="320" width="480" height="100" fill="#FFF47F" stroke="#1a1a1a" stroke-width="1.5"/>
    <text x="176" y="346" font-family="Inter, sans-serif" font-size="11" font-weight="700" letter-spacing="0.1em" fill="#1a1a1a">PUBLIC GOOD &amp; PERSONAL LIFE</text>
    <text x="176" y="368" font-family="Inter, sans-serif" font-size="12" fill="#3a3a3a">Healthcare · Mental health · Accessibility · Civic services</text>
    <text x="176" y="384" font-family="Inter, sans-serif" font-size="12" fill="#3a3a3a">Education · Personal infrastructure · Eldercare · Parenting</text>
  </g>

  <text x="400" y="450" text-anchor="middle" font-family="Fraunces, Georgia, serif" font-size="13" font-style="italic" fill="#6a6a6a">If your domain isn't named, that's not because it's excluded.</text>
  <text x="400" y="468" text-anchor="middle" font-family="Fraunces, Georgia, serif" font-size="13" font-style="italic" fill="#6a6a6a">It's because no list moves fast enough to name everything.</text>
</svg>
