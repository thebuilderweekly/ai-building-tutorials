<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" width="800" height="480">
  <rect width="800" height="480" fill="#faf8f3"/>
  <text x="400" y="32" text-anchor="middle" font-family="Fraunces, Georgia, serif" font-size="18" font-style="italic" fill="#1a1a1a" font-weight="400">Anywhere humans produce output, AI builders are producing it</text>

  <g>
