<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" width="800" height="460">
  <rect width="800" height="460" fill="#faf8f3"/>
  <text x="180" y="36" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="700" letter-spacing="0.15em" fill="#6a6a6a">BEFORE</text>
  <text x="620" y="36" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="700" letter-spacing="0.15em" fill="#6a6a6a">AFTER</text>

  <g opacity="0.85">
    <rect x="60" y="70" width="120" height="40" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
    <text x="120" y="95" text-anchor="middle" font-family="Fraunces, Georgia, serif" font-size="14" fill="#1a1a1a">Engineer</text>

    <rect x="200" y="70" width="120" height="40" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
    <text x="260" y="95" text-anchor="middle" font-family="Fraunces, Georgia, serif" font-size="14" fill="#1a1a1a">Operator</text>

    <rect x="60" y="130" width="120" height="40" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
    <text x="120" y="155" text-anchor="middle" font-family="Fraunces, Georgia, serif" font-size="14" fill="#1a1a1a">Creator</text>

    <rect x="200" y="130" width="120" height="40" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
    <text x="260" y="155" text-anchor="middle" font-family="Fraunces, Georgia, serif" font-size="14" fill="#1a1a1a">Analyst</text>

    <rect x="60" y="190" width="120" height="40" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
    <text x="120" y="215" text-anchor="middle" font-family="Fraunces, Georgia, serif" font-size="14" fill="#1a1a1a">Founder</text>

    <rect x="200" y="190" width="120" height="40" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
    <text x="260" y="215" text-anchor="middle" font-family="Fraunces, Georgia, serif" font-size="14" fill="#1a1a1a">Freelancer</text>

    <rect x="60" y="250" width="120" height="40" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
    <text x="120" y="275" text-anchor="middle" font-family="Fraunces, Georgia, serif" font-size="14" fill="#1a1a1a">Marketer</text>

    <rect x="200" y="250" width="120" height="40" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
    <text x="260" y="275" text-anchor="middle" font-family="Fraunces, Georgia, serif" font-size="14" fill="#1a1a1a">Researcher</text>

    <rect x="60" y="310" width="120" height="40" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
    <text x="120" y="335" text-anchor="middle" font-family="Fraunces, Georgia, serif" font-size="14" fill="#1a1a1a">Designer</text>

    <rect x="200" y="310" width="120" height="40" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
    <text x="260" y="335" text-anchor="middle" font-family="Fraunces, Georgia, serif" font-size="14" fill="#1a1a1a">Strategist</text>
  </g>

  <g stroke="#1a1a1a" stroke-width="1" opacity="0.4">
    <line x1="330" y1="90" x2="500" y2="220"/>
    <line x1="330" y1="150" x2="500" y2="225"/>
    <line x1="330" y1="210" x2="500" y2="230"/>
    <line x1="330" y1="270" x2="500" y2="235"/>
    <line x1="330" y1="330" x2="500" y2="240"/>
  </g>

  <g>
    <rect x="500" y="190" width="240" height="80" fill="#FFF47F" stroke="#1a1a1a" stroke-width="2"/>
    <text x="620" y="220" text-anchor="middle" font-family="Fraunces, Georgia, serif" font-size="22" font-weight="500" fill="#1a1a1a">AI Builder</text>
    <text x="620" y="248" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" letter-spacing="0.05em" fill="#3a3a3a">the new organizing unit</text>
  </g>

  <text x="400" y="410" text-anchor="middle" font-family="Fraunces, Georgia, serif" font-size="13" font-style="italic" fill="#6a6a6a">When the tools converge, the categories collapse.</text>
  <text x="400" y="430" text-anchor="middle" font-family="Fraunces, Georgia, serif" font-size="13" font-style="italic" fill="#6a6a6a">The old vocabulary doesn't have a word for this person.</text>
